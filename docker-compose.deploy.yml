services:

  # ── Reverse proxy ────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: laravel_medical_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.watch=true"
      - "--entrypoints.web.address=:80"
      - "--metrics.prometheus=true"
      - "--log.level=INFO"
    ports:
      - "80:80"       # app traffic
      - "9090:8080"   # Traefik dashboard → http://localhost:9090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: laravel_medical_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: laravel_medical
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ularavel", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── App — Blue slot ───────────────────────────────────────────────────────────
  app-blue:
    image: ghcr.io/soul312/laravel_medical:green-blue
    container_name: laravel_medical_app_blue
    restart: unless-stopped
    profiles: [blue]
    environment:
      APP_ENV: production
      APP_DEBUG: true
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_medical
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel-blue.rule=PathPrefix(`/`)"
      - "traefik.http.routers.laravel-blue.entrypoints=web"
      - "traefik.http.services.laravel-blue.loadbalancer.server.port=8000"
      - "traefik.http.services.laravel-blue.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.laravel-blue.loadbalancer.healthcheck.interval=10s"

  # ── App — Green slot ──────────────────────────────────────────────────────────
  app-green:
    image: ghcr.io/soul312/laravel_medical:green-blue
    container_name: laravel_medical_app_green
    restart: unless-stopped
    profiles: [green]
    environment:
      APP_ENV: production
      APP_DEBUG: true
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_medical
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel-green.rule=PathPrefix(`/`)"
      - "traefik.http.routers.laravel-green.entrypoints=web"
      - "traefik.http.services.laravel-green.loadbalancer.server.port=8000"
      - "traefik.http.services.laravel-green.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.laravel-green.loadbalancer.healthcheck.interval=10s"

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: laravel_medical_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"                 # Prometheus UI → http://localhost:9091
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.middlewares.prometheus-strip.stripprefix.prefixes=/prometheus"
      - "traefik.http.routers.prometheus.middlewares=prometheus-strip"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: laravel_medical_grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ── Uptime Kuma ───────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: laravel_medical_uptime_kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=PathPrefix(`/uptime`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=web"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
      - "traefik.http.middlewares.uptime-strip.stripprefix.prefixes=/uptime"
      - "traefik.http.routers.uptime-kuma.middlewares=uptime-strip"

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
  uptime_kuma_data:
