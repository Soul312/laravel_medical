services:
  # ── Docker Socket Proxy (for Windows Docker Desktop compatibility) ─────────────
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: laravel_medical_socket_proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - EVENTS=1
      - PING=1
      - VERSION=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── Reverse proxy ────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v2.10
    container_name: laravel_medical_traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"       # app traffic
      - "9090:8080"   # Traefik dashboard → http://localhost:9090

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: laravel_medical_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: laravel_medical
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ularavel", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── App — Blue slot ───────────────────────────────────────────────────────────
  app-blue:
    image: ghcr.io/soul312/laravel_medical:green-blue
    container_name: laravel_medical_app_blue
    restart: unless-stopped
    profiles: [blue]
    environment:
      APP_ENV: production
      APP_DEBUG: true
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_medical
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel.rule=PathPrefix(`/`)"
      - "traefik.http.routers.laravel.entrypoints=web"
      - "traefik.http.services.laravel-app.loadbalancer.server.port=8000"
      - "traefik.http.services.laravel-app.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.laravel-app.loadbalancer.healthcheck.interval=10s"

  # ── App — Green slot ──────────────────────────────────────────────────────────
  app-green:
    image: ghcr.io/soul312/laravel_medical:green-blue
    container_name: laravel_medical_app_green
    restart: unless-stopped
    profiles: [green]
    environment:
      APP_ENV: production
      APP_DEBUG: true
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_medical
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel.rule=PathPrefix(`/`)"
      - "traefik.http.routers.laravel.entrypoints=web"
      - "traefik.http.services.laravel-app.loadbalancer.server.port=8000"
      - "traefik.http.services.laravel-app.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.laravel-app.loadbalancer.healthcheck.interval=10s"

volumes:
  mysql_data:
