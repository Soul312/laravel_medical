global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'laravel-app'
    metrics_path: /metrics
    static_configs:
      - targets: ['laravel_medical_nginx:80']

  - job_name: 'nginx'
    static_configs:
      - targets: ['laravel_medical_nginx:80']
