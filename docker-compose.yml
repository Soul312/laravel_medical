version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: laravel_medical_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: laravel_medical
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel_network

  app:
    build: .
    container_name: laravel_medical_app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_medical
      DB_USERNAME: root
      DB_PASSWORD: secret
    volumes:
      - app_data:/var/www
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - laravel_network

  nginx:
    image: nginx:1.25-alpine
    container_name: laravel_medical_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_data:/var/www
    depends_on:
      - app
    networks:
      - laravel_network

volumes:
  db_data:
  app_data:

networks:
  laravel_network:
    driver: bridge
